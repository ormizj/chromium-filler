<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MixedBoard — job posting</title>
    <style>
      body { font: 15px/1.6 system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; }
      label { display: block; margin: 12px 0 4px; font-weight: 600; }
      input, textarea { width: 100%; padding: 8px; box-sizing: border-box; font: inherit; }
      .apply { display: inline-block; margin-top: 16px; padding: 10px 18px; background: #6366f1; color: #fff; border-radius: 8px; text-decoration: none; }
      #board-success { display: none; color: #15803d; font-weight: 700; margin-top: 16px; }
      button { margin-top: 16px; padding: 10px 18px; }
    </style>
  </head>
  <body>
    <!--
      HARD CASE #4 — Mixed board: the same site serves both kinds of posting, so
      the branch is per posting, not per site. Everything here is classified by
      the HEURISTIC — the config carries no `applySelector` (see external-board
      for the configured shapes).

        ?job=quick    applies in place and must keep filling normally.
        ?job=external hands off to an employer ATS on ANOTHER host (127.0.0.1 vs
                      localhost — genuinely cross-origin against the same fixture
                      server), behind a "Save job" button the board uses for its
                      own application tracking.
        ?job=blank    a bare "Apply now" with target=_blank. No label pattern
                      matches it; only the new-tab + cross-origin rule does.
        ?job=tracked  the same handoff through a tracker chain (302 → interstitial
                      → ATS), so the URL finally recorded is the last one, not the
                      first hop.
    -->
    <h1 id="job-title">Senior Widget Engineer</h1>
    <div id="job-description">
      MixedBoard lists both quick-apply postings and postings that are handled on
      the employer's own site. Which one this is depends on the posting, not the site.
    </div>

    <div id="posting"></div>

    <script>
      const EMPLOYER = 'http://127.0.0.1:5199';
      const TRACKER = 'http://127.0.0.1:5200';
      // 302 → interstitial → the real form. Built the same way as scenarios.mjs
      // builds it, so the catalog URL and this link stay the same chain.
      const HOP = `${TRACKER}/sites/redirect-hop.html?ms=700&to=`
        + encodeURIComponent(`${EMPLOYER}/sites/ats-form.html?via=chain`);
      const TRACKED = `${TRACKER}/r/302?to=${encodeURIComponent(HOP)}`;

      const kind = new URLSearchParams(location.search).get('job') ?? 'external';

      if (kind === 'quick') {
        document.getElementById('posting').innerHTML = `
          <h2>Apply here</h2>
          <form id="board-form">
            <label for="first_name">First name</label>
            <input id="first_name" name="first_name" />

            <label for="last_name">Last name</label>
            <input id="last_name" name="last_name" />

            <label for="email">Email</label>
            <input id="email" name="email" type="email" />

            <label for="resume-file">Résumé (PDF)</label>
            <input id="resume-file" name="resume" type="file" />

            <button id="submit" type="submit">Send application</button>
          </form>
          <div id="board-success">✓ Application submitted to MixedBoard.</div>
        `;
        document.getElementById('board-form').addEventListener('submit', (e) => {
          e.preventDefault();
          document.getElementById('board-success').style.display = 'block';
        });
      } else {
        // Only the href differs between these: the point is which heuristic rule
        // fires. "Apply on company website" matches on its label; "Apply now"
        // matches only because it is cross-origin AND opens a new tab.
        const applyLink = kind === 'blank'
          ? `<a id="apply-external" class="apply" target="_blank"
                href="${EMPLOYER}/sites/ats-form.html?src=blank">Apply now</a>`
          : `<a id="apply-external" class="apply"
                href="${kind === 'tracked' ? TRACKED : `${EMPLOYER}/sites/ats-form.html`}"
                >Apply on company website</a>`;

        document.getElementById('posting').innerHTML = `
          <button id="save-job" data-saved="0">Save job</button>
          ${applyLink}
        `;
        document.getElementById('save-job').addEventListener('click', (e) => {
          const btn = e.currentTarget;
          btn.dataset.saved = '1';
          btn.textContent = 'Saved ✓';
        });
      }
    </script>
  </body>
</html>
