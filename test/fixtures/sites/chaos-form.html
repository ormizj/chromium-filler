<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChaosForm — Full-Stack Engineer</title>
    <style>
      body { font: 15px/1.6 system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; }
      label { display: block; margin: 12px 0 4px; font-weight: 600; }
      input, textarea { width: 100%; padding: 8px; box-sizing: border-box; font: inherit; }
      .step { display: none; }
      .step.active { display: block; }
      #chaos-success { display: none; color: #15803d; font-weight: 700; margin-top: 16px; }
      button { margin-top: 16px; padding: 10px 18px; }
    </style>
  </head>
  <body>
    <!--
      HARD CASE #3 — Everything wrong at once:
      * Form injected late (~1.5s).
      * All ids are hashed/generated, so id-based matching is useless; matching
        must fall back to labels / placeholders / aria-labels.
      * Multi-step: CV + cover letter live on step 2, revealed by "Next" (prep).
      * One field ("How did you hear about us?") is intentionally unmappable and
        must show up as unmatched (red) for the Pick workflow.
    -->
    <h1 id="role-title">Full-Stack Engineer</h1>
    <div id="role-desc">
      ChaosForm is hiring a Full-Stack Engineer. Our application form is, uh,
      characterful. Good luck — and that is exactly the point of this test.
    </div>
    <p id="loading">Loading…</p>
    <div id="mount"></div>

    <script>
      // Random-ish hashed id, like framework-generated ids we must NOT rely on.
      const hid = (s) => `fld-${s}-a1b2c3d4e5f6`;

      setTimeout(() => {
        document.getElementById('loading').remove();
        document.getElementById('mount').innerHTML = `
          <form id="chaos-form">
            <div class="step active" id="step1">
              <label>Given name
                <input id="${hid('gn')}" />
              </label>
              <label for="${hid('sn')}">Family name</label>
              <input id="${hid('sn')}" placeholder="Family name" />
              <input id="${hid('em')}" aria-label="Email address" placeholder="you@company.com" />
              <!-- This is really the "city" field, but nothing here says so:
                   hashed id, no placeholder, and a label our heuristics miss.
                   It should surface as unmatched (red) and be fixed via Pick. -->
              <label for="${hid('loc')}">Where are you located?</label>
              <input id="${hid('loc')}" />
              <button type="button" id="next-btn">Next</button>
            </div>
            <div class="step" id="step2">
              <label for="${hid('cl')}">Cover letter</label>
              <textarea id="${hid('cl')}"></textarea>
              <label for="${hid('cv')}">Attach CV</label>
              <input id="${hid('cv')}" type="file" />
              <button id="chaos-submit" type="submit">Submit</button>
            </div>
          </form>
          <div id="chaos-success">✓ Submitted to ChaosForm.</div>
        `;
        document.getElementById('next-btn').addEventListener('click', () => {
          document.getElementById('step2').classList.add('active');
        });
        document.getElementById('chaos-form').addEventListener('submit', (e) => {
          e.preventDefault();
          document.getElementById('chaos-success').style.display = 'block';
        });
      }, 1500);
    </script>
  </body>
</html>
